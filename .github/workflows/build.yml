name: Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: chmod gradlew
        run: chmod +x gradlew

      # ============ 编译主项目 ============
      - name: Build Main APK
        env:
          BAIDU_MAP_DEFAULT_KEY: ${{ secrets.BAIDU_MAP_DEFAULT_KEY }}
        run: ./gradlew assembleRelease

      # ============ 编译 Xposed 子模块 ============
      - name: chmod gradlew (Xposed)
        run: chmod +x KailLocationXposed/gradlew

      - name: Build Xposed APK
        env:
          BAIDU_MAP_DEFAULT_KEY: ${{ secrets.BAIDU_MAP_DEFAULT_KEY }}
        working-directory: KailLocationXposed
        run: ./gradlew assembleRelease

      # ============ 复制 Xposed APK 到主目录 ============
      - name: Copy Xposed APK to release directory
        run: |
          # 检查 Xposed APK 是否存在
          if ! ls KailLocationXposed/app/build/outputs/apk/release/*.apk 1> /dev/null 2>&1; then
            echo "Xposed APK not found!"
            exit 1
          fi
          
          # 复制到主目录（文件名已经不同，不会覆盖）
          cp KailLocationXposed/app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/
          
          echo "All APKs in release directory:"
          ls -la app/build/outputs/apk/release/

      # ============ 设置签名工具版本 ============
      - name: Setup sign tool version variable
        shell: bash
        run: |
          BUILD_TOOL_VERSION=$(ls /usr/local/lib/android/sdk/build-tools/ | tail -n 1)
          echo "ANDROID_SIGN_TOOL_VERSION=$BUILD_TOOL_VERSION" >> $GITHUB_ENV
          echo "Last build tool version is: $BUILD_TOOL_VERSION"

      # ============ 签名主 APK ============
      - name: Sign Main APK
        uses: r0adkll/sign-android-release@v1
        id: sign_main_apk
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: ${{ env.ANDROID_SIGN_TOOL_VERSION }}

      # ============ 签名 Xposed APK ============
      - name: Sign Xposed APK
        uses: r0adkll/sign-android-release@v1
        id: sign_xposed_apk
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: ${{ env.ANDROID_SIGN_TOOL_VERSION }}

      # ============ 上传 ============
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: kaillocation-release
          path: app/build/outputs/apk/release/*-signed.apk
          if-no-files-found: error
          retention-days: 1